<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.15" stroke="#4fc3f7" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>

  <!-- Decorative tactical elements -->
  <g opacity="0.2" stroke="#4fc3f7" stroke-width="2" fill="none">
    <circle cx="150" cy="150" r="80"/>
    <circle cx="150" cy="150" r="60"/>
    <line x1="150" y1="70" x2="150" y2="230"/>
    <line x1="70" y1="150" x2="230" y2="150"/>
  </g>
  <g opacity="0.15" stroke="#ffb74d" stroke-width="1.5" fill="none">
    <rect x="950" y="80" width="120" height="120" rx="5"/>
    <rect x="970" y="100" width="80" height="80" rx="3"/>
  </g>

  <!-- Main title: COUNTER-STRIKE 2 -->
  <text x="600" y="230" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="4" filter="url(#glow)">COUNTER-STRIKE</text>
  <text x="600" y="310" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="url(#accent)" letter-spacing="6">2</text>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#4fc3f7" letter-spacing="8" opacity="0.9">攻 略 站  |  TACTICS GUIDE</text>

  <!-- Divider -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Feature tags -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#aaaaaa">
    <text x="600" y="445" text-anchor="middle">地图攻略  ·  武器数据  ·  经济管理  ·  准星配置  ·  职业分析</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4fc3f7" opacity="0.7">counter-strike-2-tactics.vercel.app</text>

  <!-- Bottom decorative line -->
  <rect x="0" y="590" width="1200" height="3" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="593" width="200" height="2" fill="#ffb74d" opacity="0.8"/>
</svg>
